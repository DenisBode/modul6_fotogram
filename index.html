<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" type="image/x-icon" href="./img/favicon.png">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="./styles/dialog.css">
</head>

<body>
    <header class="topNavBar">
        <div class="container">
            <img src="./img/logo_text.png" alt="Fotogram Container Logo" class="logo">
        </div>
    </header>


    <main class="container">
        <header class="gallery-Header">
            <h1>
                <strong>My</strong> personal photo album
            </h1>
        </header>

        <section id="gallery" class="albumsection">
        </section>

        <dialog id="imagePopup">
            <div id="imgName" class="imgName">Test</div>
            <button id="closeBtn">X</button>
            <div class="popup-content">
                <img id="popupImg" src="" alt="">
                <nav class="nav-bar">
                    <button id="prevBtn" class="nav-btn"><span class="navText"> Zurück</span>❮</button>
                    <div class="indexImages" id="indexImages"></div>
                    <button id="nextBtn" class="nav-btn"><span class="navText">Weiter </span>❯</button>
                </nav>
            </div>
        </dialog>
    </main>

    <footer class="bottomBar">
        <div class="footercontainer">
            <img src="./img/DA_Footer_Logo.svg" alt="DeveloperAkademie Footer Logo">
        </div>
    </footer>

    <script src="/scripts.js"></script>
</body>


</html>
