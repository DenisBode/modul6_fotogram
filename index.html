<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/dialog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="topNavBar">

        <img src="./img/logo_photogram.png" alt="Fotogram Container Logo" class="logo">
        <nav>

        </nav>
    </header>
    <main>
        <article class="galleryWrapper">
            <header>
                <h1><strong>My</strong> personal photo album</h1>
            </header>
            <section id="gallery" class="albumsection">
            </section>
            <dialog id="imagePopup">
                <div id="imgName" class="imgName">Test</div>
                <button id="closeBtn">X</button>

                <div class="popup-content">
                    <img id="popupImg" src="" alt="">

                    <div class="nav-bar">
                        <button id="prevBtn" class="nav-btn">❮ Zurück</button>
                        <div class="indexImages" id="indexImages"></div>
                        <button id="nextBtn" class="nav-btn">Weiter ❯</button>
                    </div>
                </div>
            </dialog>
        </article>
    </main>
    <footer class="bottomBar">
        <p>Veröffentlicht am 20. April 2026</p>
    </footer>
    <script src="/scripts.js"></script>
</body>

</html>
